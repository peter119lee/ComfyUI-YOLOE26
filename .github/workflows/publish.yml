name: Publish to ComfyUI Registry

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  publish-node:
    name: Publish to Comfy Registry
    runs-on: ubuntu-latest
    # Gate on the fork flag, not a hardcoded owner: the peter119lee ->
    # Rinne414 account rename made an owner-string guard silently skip
    # every publish.
    if: ${{ github.event.repository.fork == false }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@v1
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
